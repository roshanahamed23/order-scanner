<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dispatch Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --navy:  #1e3a5f;
  --teal:  #0d9488;
  --green: #16a34a;
  --red:   #dc2626;
  --amber: #d97706;
  --bg:    #f1f5f9;
  --card:  #ffffff;
  --text:  #1e293b;
  --muted: #64748b;
  --border:#e2e8f0;
}

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 40px;
}

/* HEADER */
.header {
  background: var(--navy);
  color: #fff;
  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 50;
}
.header h1 { font-size: 1.1rem; font-weight: 700; }
.sheet-badge {
  font-size: .72rem;
  background: var(--teal);
  padding: 3px 10px;
  border-radius: 99px;
  font-weight: 600;
}

/* LAYOUT */
.page { padding: 14px 12px; display: flex; flex-direction: column; gap: 12px; }

/* CARD */
.card {
  background: var(--card);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
}
.card-title {
  padding: 10px 14px;
  font-size: .72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
  background: #f8fafc;
  border-bottom: 1px solid var(--border);
}
.card-body { padding: 14px; }

/* MARKETPLACE TABS */
.mp-tabs { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.mp-tab {
  padding: 12px 6px;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: #fff;
  font-size: .88rem;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
  transition: all .15s;
  color: var(--muted);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.mp-tab .mp-icon { font-size: 1.4rem; }
.mp-tab .mp-cnt  { font-size: .68rem; font-weight: 500; }
.mp-tab.active   { border-color: var(--navy); background: var(--navy); color: #fff; }
.mp-tab.active .mp-cnt { color: rgba(255,255,255,.7); }

/* MODE TOGGLE */
.mode-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.mode-btn {
  padding: 11px;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: #fff;
  font-size: .85rem;
  font-weight: 700;
  cursor: pointer;
  color: var(--muted);
  transition: all .15s;
}
.mode-btn.active { border-color: var(--teal); color: var(--teal); background: #f0fdfa; }

/* AWB INPUT */
.input-wrap { position: relative; }
#awbInput {
  width: 100%;
  padding: 14px 16px;
  font-size: 1.15rem;
  font-family: 'Courier New', monospace;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: #f8fafc;
  color: var(--navy);
  outline: none;
  letter-spacing: .04em;
  transition: border-color .15s;
}
#awbInput:focus { border-color: var(--navy); background: #fff; }

/* CAMERA BUTTON */
#cameraBtn {
  width: 100%;
  margin-top: 10px;
  padding: 13px;
  border: 2px dashed var(--border);
  border-radius: 10px;
  background: #f8fafc;
  font-size: .9rem;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
#cameraBtn.active { border-color: var(--teal); color: var(--teal); background: #f0fdfa; }

/* CAMERA AREA */
#cameraArea { display: none; margin-top: 10px; border-radius: 10px; overflow: hidden; background: #000; }
#cameraArea.show { display: block; }
#cameraReader { width: 100%; }
#cameraReader video { width: 100% !important; height: auto !important; display: block; }
#cameraReader img, #cameraReader select, #cameraReader button { display: none !important; }
.cam-stop-btn {
  width: 100%;
  padding: 11px;
  background: #fee2e2;
  border: none;
  border-top: 1px solid #fecaca;
  font-size: .88rem;
  font-weight: 700;
  color: var(--red);
  cursor: pointer;
}

/* STATUS BANNER */
.status-box {
  padding: 14px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: #f8fafc;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  min-height: 64px;
  transition: background .2s, border-color .2s;
}
.status-box.success { background: #f0fdf4; border-color: #86efac; }
.status-box.error   { background: #fef2f2; border-color: #fca5a5; }
.status-box.warn    { background: #fffbeb; border-color: #fcd34d; }
.status-box.info    { background: #eff6ff; border-color: #93c5fd; }
.s-icon { font-size: 1.5rem; flex-shrink: 0; line-height: 1; }
.s-body .s-title { font-size: .95rem; font-weight: 700; }
.s-body .s-sub   { font-size: .78rem; color: var(--muted); margin-top: 2px; font-family: 'Courier New', monospace; word-break: break-all; }

/* LAST SCAN */
.last-scan-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: .8rem;
  color: var(--muted);
  padding: 8px 14px 0;
}
.last-scan-row strong { font-family: monospace; color: var(--navy); }

/* STATS */
.stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.stat {
  background: #f8fafc;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 8px;
  text-align: center;
}
.stat .val {
  font-size: 1.8rem;
  font-weight: 800;
  line-height: 1;
  color: var(--navy);
}
.stat .lbl { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-top: 3px; }
.stat.s-today .val   { color: var(--teal); }
.stat.s-cancel .val  { color: var(--red); }

/* BREAKDOWN */
.mp-breakdown { display: flex; flex-direction: column; gap: 0; }
.mp-line {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #f1f5f9;
  font-size: .88rem;
}
.mp-line:last-child { border-bottom: none; }
.mp-name { display: flex; align-items: center; gap: 8px; font-weight: 600; }
.dot { width: 9px; height: 9px; border-radius: 50%; }
.d-m { background: #ee4d2d; }
.d-f { background: #2874f0; }
.d-a { background: #ff9900; }
.mp-nums { display: flex; gap: 14px; font-size: .8rem; color: var(--muted); }
.mp-nums strong { color: var(--text); margin-left: 3px; }

/* PROGRESS */
.prog-wrap {
  height: 6px; border-radius: 99px;
  background: var(--border);
  overflow: hidden;
  display: flex;
  margin-top: 12px;
  gap: 2px;
}
.prog-seg { height: 100%; border-radius: 99px; transition: width .4s ease; }
</style>
</head>
<body>

<div class="header">
  <h1>📦 Dispatch Scanner</h1>
  <span class="sheet-badge" id="sheetBadge">Loading…</span>
</div>

<div class="page">

  <!-- MARKETPLACE -->
  <div class="card">
    <div class="card-title">Marketplace</div>
    <div class="card-body">
      <div class="mp-tabs">
        <button class="mp-tab active" onclick="setMP('Meesho',this)">
          <span class="mp-icon">🛍️</span>
          Meesho
          <span class="mp-cnt" id="tc-Meesho">0 today</span>
        </button>
        <button class="mp-tab" onclick="setMP('Flipkart',this)">
          <span class="mp-icon">🛒</span>
          Flipkart
          <span class="mp-cnt" id="tc-Flipkart">0 today</span>
        </button>
        <button class="mp-tab" onclick="setMP('Amazon',this)">
          <span class="mp-icon">📦</span>
          Amazon
          <span class="mp-cnt" id="tc-Amazon">0 today</span>
        </button>
      </div>
    </div>
  </div>

  <!-- SCAN -->
  <div class="card">
    <div class="card-title">Scan AWB</div>
    <div class="card-body">

      <!-- Mode -->
      <div class="mode-row" style="margin-bottom:10px;">
        <button class="mode-btn active" id="modeDispatch" onclick="setMode('dispatch')">✅ Dispatch</button>
        <button class="mode-btn"        id="modeCancel"   onclick="setMode('cancel')">❌ Cancel</button>
      </div>

      <!-- Keyboard input -->
      <input type="text" id="awbInput" placeholder="Scan / type AWB here…" autocomplete="off">

      <!-- Camera button -->
      <button id="cameraBtn" onclick="toggleCamera()">📷 Scan with Camera</button>

      <!-- Camera viewer (inline, no modal) -->
      <div id="cameraArea">
        <div id="cameraReader"></div>
        <button class="cam-stop-btn" onclick="stopCamera()">■ Stop Camera</button>
      </div>

      <!-- Status -->
      <div style="margin-top:10px;">
        <div class="status-box" id="statusBox">
          <div class="s-icon">📷</div>
          <div class="s-body">
            <div class="s-title" id="sTitle">Waiting for scan…</div>
            <div class="s-sub"   id="sSub">Select marketplace then scan</div>
          </div>
        </div>
        <div class="last-scan-row">
          Last: <strong id="lastAWB">—</strong>
        </div>
      </div>

    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="card">
    <div class="card-title">Dashboard</div>
    <div class="card-body">

      <div class="stats-grid">
        <div class="stat s-today">
          <div class="val" id="dToday">0</div>
          <div class="lbl">Today</div>
        </div>
        <div class="stat">
          <div class="val" id="dMonth">0</div>
          <div class="lbl">Month</div>
        </div>
        <div class="stat s-cancel">
          <div class="val" id="dCancel">0</div>
          <div class="lbl">Cancelled</div>
        </div>
      </div>

      <div class="mp-breakdown" style="margin-top:14px;">
        <div class="mp-line">
          <div class="mp-name"><div class="dot d-m"></div>Meesho</div>
          <div class="mp-nums">Today<strong id="mt-Meesho">0</strong> Month<strong id="mm-Meesho">0</strong></div>
        </div>
        <div class="mp-line">
          <div class="mp-name"><div class="dot d-f"></div>Flipkart</div>
          <div class="mp-nums">Today<strong id="mt-Flipkart">0</strong> Month<strong id="mm-Flipkart">0</strong></div>
        </div>
        <div class="mp-line">
          <div class="mp-name"><div class="dot d-a"></div>Amazon</div>
          <div class="mp-nums">Today<strong id="mt-Amazon">0</strong> Month<strong id="mm-Amazon">0</strong></div>
        </div>
      </div>

      <div class="prog-wrap">
        <div class="prog-seg" id="pg-m" style="background:#ee4d2d;width:33%"></div>
        <div class="prog-seg" id="pg-f" style="background:#2874f0;width:33%"></div>
        <div class="prog-seg" id="pg-a" style="background:#ff9900;width:34%"></div>
      </div>

    </div>
  </div>

</div><!-- /page -->

<script>
// ── CONFIG ────────────────────────────────────────────
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz98sjZYW5EJpa-j8FHLhkVhKiohuD6Xv97KmkuDgPPLZJOYP5zcy8FwPyEMe4JFAvhlQ/exec";

// ── STATE ─────────────────────────────────────────────
let marketplace = "Meesho";
let scanMode    = "dispatch";
let db = { today:0, month:0, cancelled:0,
           marketplace:{Meesho:0,Flipkart:0,Amazon:0},
           todayMarketplace:{Meesho:0,Flipkart:0,Amazon:0} };

// ── MARKETPLACE ───────────────────────────────────────
function setMP(name, btn) {
  marketplace = name;
  document.querySelectorAll(".mp-tab").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  focus();
}

// ── MODE ──────────────────────────────────────────────
function setMode(mode) {
  scanMode = mode;
  document.getElementById("modeDispatch").classList.toggle("active", mode === "dispatch");
  document.getElementById("modeCancel").classList.toggle("active",   mode === "cancel");
  document.getElementById("awbInput").placeholder =
    mode === "cancel" ? "Scan AWB to CANCEL…" : "Scan / type AWB here…";
  focus();
}

// ── KEYBOARD INPUT ────────────────────────────────────
document.getElementById("awbInput").addEventListener("keydown", async function(e) {
  if (e.key !== "Enter") return;
  const awb = this.value.trim();
  if (!awb) return;
  this.value = "";
  await handleAWB(awb);
});

function focus() {
  setTimeout(() => document.getElementById("awbInput").focus(), 80);
}

// ── CAMERA ────────────────────────────────────────────
let qr = null;
let qrOn = false;
let lastScan = null;

function toggleCamera() {
  if (qrOn) {
    stopCamera();
  } else {
    startCamera();
  }
}

async function startCamera() {
  const area = document.getElementById("cameraArea");
  const btn  = document.getElementById("cameraBtn");

  area.classList.add("show");
  btn.classList.add("active");
  btn.textContent = "📷 Camera ON";

  setStatus("", "📷", "Starting camera…", "");

  try {
    if (!qr) qr = new Html5Qrcode("cameraReader");

    const cameras = await Html5Qrcode.getCameras();
    if (!cameras || !cameras.length) throw new Error("No camera found on this device");

    const cam = cameras.find(c => /back|rear|environment/i.test(c.label))
             || cameras[cameras.length - 1];

    await qr.start(
      cam.id,
      { fps: 12, qrbox: { width: 280, height: 110 } },
      onCamScan,
      () => {}
    );

    qrOn = true;
    setStatus("", "📷", "Point at barcode…", "Camera is live");

  } catch(err) {
    setStatus("error", "❌", "Camera failed", err.message);
    stopCamera();
  }
}

async function stopCamera() {
  if (qr && qrOn) {
    try { await qr.stop(); } catch {}
    try { qr.clear(); }      catch {}
    qr = null;
  }
  qrOn = false;

  const area = document.getElementById("cameraArea");
  const btn  = document.getElementById("cameraBtn");
  area.classList.remove("show");
  btn.classList.remove("active");
  btn.textContent = "📷 Scan with Camera";

  focus();
}

async function onCamScan(text) {
  const awb = text.trim();
  if (awb === lastScan) return;
  lastScan = awb;
  setTimeout(() => { lastScan = null; }, 3000);

  beep();
  if (navigator.vibrate) navigator.vibrate([80, 40, 80]);

  await handleAWB(awb);
  setTimeout(() => {
    if (qrOn) setStatus("", "📷", "Ready — next barcode…", "");
  }, 1500);
}

// ── SAVE / CANCEL ─────────────────────────────────────
async function handleAWB(awb) {
  document.getElementById("lastAWB").textContent = awb;
  setStatus("", "⏳", "Saving…", awb);

  if (scanMode === "dispatch") await doSave(awb);
  else                          await doCancel(awb);
}

async function doSave(awb) {
  try {
    const res  = await fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action:"save", awb, marketplace }),
      redirect: "follow"
    });
    const data = await res.json();

    if (data.status === "success") {
      setStatus("success", "✅", "Saved — " + marketplace, awb);
      db.today++; db.month++;
      db.marketplace[marketplace]++;
      db.todayMarketplace[marketplace]++;
      renderDB();
    } else if (data.status === "duplicate") {
      setStatus("warn", "⚠️", "Duplicate AWB", "Already: " + data.existingStatus);
    } else {
      setStatus("error", "❌", data.message || "Error", awb);
    }
  } catch {
    setStatus("error", "🔌", "Connection error", "Check URL in script");
  }
}

async function doCancel(awb) {
  try {
    const res  = await fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action:"cancel", awb }),
      redirect: "follow"
    });
    const data = await res.json();

    if (data.status === "cancelled") {
      setStatus("info", "🚫", "Cancelled", awb);
      db.cancelled++;
      if (db.month > 0) db.month--;
      renderDB();
    } else if (data.status === "already_cancelled") {
      setStatus("warn", "⚠️", "Already cancelled", awb);
    } else {
      setStatus("error", "❌", data.message || "Not found", awb);
    }
  } catch {
    setStatus("error", "🔌", "Connection error", "Check URL in script");
  }
}

// ── DASHBOARD ─────────────────────────────────────────
async function loadDashboard() {
  try {
    const res  = await fetch(SCRIPT_URL + "?action=dashboard", { redirect:"follow" });
    const data = await res.json();
    if (data.status === "success") {
      db = data;
      renderDB();
      document.getElementById("sheetBadge").textContent = data.sheetName || "—";
    }
  } catch {
    document.getElementById("sheetBadge").textContent = "Offline";
  }
}

function renderDB() {
  document.getElementById("dToday").textContent  = db.today     ?? 0;
  document.getElementById("dMonth").textContent  = db.month     ?? 0;
  document.getElementById("dCancel").textContent = db.cancelled ?? 0;

  const mp = db.marketplace      || {};
  const mt = db.todayMarketplace || {};

  ["Meesho","Flipkart","Amazon"].forEach(n => {
    document.getElementById("mm-"+n).textContent = mp[n] ?? 0;
    document.getElementById("mt-"+n).textContent = mt[n] ?? 0;
    document.getElementById("tc-"+n).textContent = (mt[n] ?? 0) + " today";
  });

  const tot = (mp.Meesho||0)+(mp.Flipkart||0)+(mp.Amazon||0) || 1;
  document.getElementById("pg-m").style.width = ((mp.Meesho  ||0)/tot*100)+"%";
  document.getElementById("pg-f").style.width = ((mp.Flipkart||0)/tot*100)+"%";
  document.getElementById("pg-a").style.width = ((mp.Amazon  ||0)/tot*100)+"%";
}

// ── UI HELPERS ────────────────────────────────────────
function setStatus(type, icon, title, sub) {
  const box = document.getElementById("statusBox");
  box.className = "status-box" + (type ? " "+type : "");
  box.querySelector(".s-icon").textContent = icon;
  document.getElementById("sTitle").textContent = title;
  document.getElementById("sSub").textContent   = sub;
}

function beep() {
  try {
    const ac   = new AudioContext();
    const osc  = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(.3, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001, ac.currentTime + .15);
    osc.start(); osc.stop(ac.currentTime + .15);
  } catch {}
}

// ── INIT ──────────────────────────────────────────────
loadDashboard();
focus();
</script>
</body>
</html>
